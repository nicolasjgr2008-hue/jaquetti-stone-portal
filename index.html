    <style>
      #jq-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
      }
      #jq-overlay {
        position: absolute;
        inset: 0;
        background: #000;
      }
      #jq-logo-clone {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        opacity: 0;
        white-space: nowrap;
        pointer-events: none;
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(36px, 5vw, 52px);
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.025em;
        text-shadow: 0 0 0px rgba(255,255,255,0);
        will-change: transform, opacity, text-shadow, font-size;
      }
      /* Subtle breathing glow while logo sits in center */
      @keyframes jq-glow-breathe {
        0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.08); }
        50%      { text-shadow: 0 0 40px rgba(255,255,255,0.18), 0 0 80px rgba(255,255,255,0.06); }
      }
    </style>

    <div id="jq-loader">
      <div id="jq-overlay"></div>
      <div id="jq-logo-clone">Jaquetti</div>
    </div>

    <script>
      (function() {
        if (sessionStorage.getItem('jaquetti_loaded')) {
          var ld = document.getElementById('jq-loader');
          if (ld) ld.remove();
          return;
        }
        sessionStorage.setItem('jaquetti_loaded', '1');
        document.body.style.overflow = 'hidden';

        var loader  = document.getElementById('jq-loader');
        var overlay = document.getElementById('jq-overlay');
        var clone   = document.getElementById('jq-logo-clone');
        var realLogo = null;

        /* ─── Robust logo finder ─── */
        function findRealLogo() {
          var el = document.querySelector('nav a[href="/"] span.font-serif')
                || document.querySelector('nav a[href="/"]')
                || document.querySelector('header a[href="/"]');
          if (!el) {
            var containers = document.querySelectorAll('nav, header, [class*="fixed"][class*="top"]');
            for (var i = 0; i < containers.length; i++) {
              var nodes = containers[i].querySelectorAll('*');
              for (var j = 0; j < nodes.length; j++) {
                if (nodes[j].textContent && nodes[j].textContent.trim() === 'Jaquetti' && nodes[j].children.length === 0) {
                  return nodes[j];
                }
              }
            }
          }
          return el;
        }

        /* Hide the real navbar logo while our clone is visible */
        var poll = setInterval(function() {
          realLogo = findRealLogo();
          if (realLogo) {
            realLogo.style.opacity = '0';
            clearInterval(poll);
          }
        }, 40);

        /* ═══ PHASE 1 (0 → 700ms): Elegant fade-in at center ═══ */
        requestAnimationFrame(function() {
          clone.style.transition = 'opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1)';
          clone.style.opacity = '1';
          clone.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        /* ═══ PHASE 2 (700 → 1400ms): Breathing glow at center ═══ */
        setTimeout(function() {
          clone.style.animation = 'jq-glow-breathe 1.4s ease-in-out infinite';
        }, 700);

        /* ═══ PHASE 3 (1400 → 2300ms): Silky flight to navbar ═══ */
        setTimeout(function() {
          clearInterval(poll);
          clone.style.animation = 'none';
          if (!realLogo) realLogo = findRealLogo();

          var cloneSize = parseFloat(getComputedStyle(clone).fontSize);
          var targetX, targetY, scaleRatio;

          if (realLogo) {
            var rect = realLogo.getBoundingClientRect();
            targetX = rect.left + rect.width / 2;
            targetY = rect.top + rect.height / 2;
            var realSize = parseFloat(getComputedStyle(realLogo).fontSize);
            scaleRatio = realSize / cloneSize;
          } else {
            /* Fallback: center-top of viewport (matching the pill navbar from screenshot) */
            targetX = window.innerWidth / 2 - (window.innerWidth > 768 ? 95 : 60);
            targetY = 27;
            scaleRatio = 18 / cloneSize;
          }

          var startX = window.innerWidth / 2;
          var startY = window.innerHeight / 2;
          var dx = targetX - startX;
          var dy = targetY - startY;

          /* Ultra-smooth deceleration curve */
          clone.style.transition = 'transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1), text-shadow 0.5s ease, opacity 0.9s ease';
          clone.style.textShadow = '0 0 0px rgba(255,255,255,0)';
          clone.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(' + scaleRatio + ')';
        }, 1400);

        /* ═══ PHASE 4 (2300 → 2700ms): Dissolve overlay + reveal ═══ */
        setTimeout(function() {
          /* Fade the clone out just before revealing the real logo */
          clone.style.transition = 'opacity 0.25s ease';
          clone.style.opacity = '0';

          overlay.style.transition = 'opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
          overlay.style.opacity = '0';

          setTimeout(function() {
            if (loader) loader.remove();
            if (realLogo) {
              realLogo.style.transition = 'opacity 0.15s ease';
              realLogo.style.opacity = '1';
              setTimeout(function() {
                realLogo.style.transition = '';
                realLogo.style.opacity = '';
              }, 200);
            }
            document.body.style.overflow = '';
          }, 400);
        }, 2300);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
